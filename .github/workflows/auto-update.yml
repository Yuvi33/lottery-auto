name: Auto Scraper & SEO
on:
  schedule:
    - cron: '35 7 * * *'
    - cron: '35 12 * * *'
    - cron: '35 14 * * *'
  workflow_dispatch:

# THIS IS THE MAGIC FIX: Telling GitHub to allow the bot to save files
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - run: node scraper.js
      - run: node generate-seo.js
      
      - run: |
          git config user.name "Bot"
          git config user.email "bot@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update results & SEO" && git push
