name: Auto Scraper
on:
  schedule:
    - cron: '35 7 * * *'
    - cron: '35 12 * * *'
    - cron: '35 14 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: node scraper.js
      - run: |
          git config user.name "Bot"
          git config user.email "bot@github.com"
          git add data/result.json
          git diff --staged --quiet || git commit -m "Update" && git push
