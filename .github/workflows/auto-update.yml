name: Auto Scraper & SEO
on:
  schedule:
    - cron: '35 7 * * *'
    - cron: '35 12 * * *'
    - cron: '35 14 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      # 1. Scrape the numbers
      - run: node scraper.js
      
      # 2. Generate SEO pages
      - run: node generate-seo.js
      
      # 3. Save everything
      - run: |
          git config user.name "Bot"
          git config user.email "bot@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update results & SEO" && git push
